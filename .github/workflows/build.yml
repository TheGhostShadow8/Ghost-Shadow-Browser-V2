name: Build Ghost Browser APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        # Updated to v4 for 2026 compatibility
        uses: actions/checkout@v4

      - name: Set up JDK 17
        # Updated to v4
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        # Using the newest official Gradle action
        uses: gradle/actions/setup-gradle@v3

      - name: Build with Gradle
        # Compiles your Java code and XML into the APK
        run: gradle assembleDebug

      - name: Upload APK Artifact
        # THIS IS THE KEY FIX: Updated from v3 to v4
        uses: actions/upload-artifact@v4
        with:
          name: GhostBrowser-APK-Build
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
